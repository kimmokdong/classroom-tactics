<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Canvas 스킬 이펙트 데모</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    color: #aac4ff;
    margin-bottom: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 0.78rem;
    color: #556;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 900px;
  }
  .card {
    background: #10101e;
    border: 1px solid #1e2040;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card-title {
    font-size: 0.72rem;
    color: #7788cc;
    padding: 7px 0 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  canvas {
    display: block;
    cursor: pointer;
  }
  .hint {
    font-size: 0.62rem;
    color: #334;
    padding: 4px 0 6px;
  }
</style>
</head>
<body>

<h1>⚡ Canvas Skill Effects Demo</h1>
<p class="subtitle">클릭하면 이펙트가 발동됩니다</p>

<div class="grid">
  <!-- 1. 파이어볼 폭발 -->
  <div class="card">
    <div class="card-title">🔥 파이어볼 폭발</div>
    <canvas id="c1" width="280" height="200"></canvas>
    <div class="hint">Click to cast</div>
  </div>
  <!-- 2. 번개 스트라이크 -->
  <div class="card">
    <div class="card-title">⚡ 번개 스트라이크</div>
    <canvas id="c2" width="280" height="200"></canvas>
    <div class="hint">Click to cast</div>
  </div>
  <!-- 3. 충격파 / �ockwave -->
  <div class="card">
    <div class="card-title">💥 충격파</div>
    <canvas id="c3" width="280" height="200"></canvas>
    <div class="hint">Click to cast</div>
  </div>
  <!-- 4. 아이스 스파이크 -->
  <div class="card">
    <div class="card-title">❄️ 아이스 스파이크</div>
    <canvas id="c4" width="280" height="200"></canvas>
    <div class="hint">Click to cast</div>
  </div>
  <!-- 5. 힐 / 성스러운 빛 -->
  <div class="card">
    <div class="card-title">✨ 성스러운 힐</div>
    <canvas id="c5" width="280" height="200"></canvas>
    <div class="hint">Click to cast</div>
  </div>
  <!-- 6. 블랙홀 / 보이드 -->
  <div class="card">
    <div class="card-title">🌀 보이드 블랙홀</div>
    <canvas id="c6" width="280" height="200"></canvas>
    <div class="hint">Click to cast</div>
  </div>
</div>

<script>
// ─── 유틸 ───────────────────────────────────────────────────────────
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b));
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function makeCanvas(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  return { canvas, ctx, W: canvas.width, H: canvas.height };
}

// ─── 1. 파이어볼 폭발 ────────────────────────────────────────────────
(function() {
  const { canvas, ctx, W, H } = makeCanvas('c1');
  let particles = [];
  let embers = [];
  let active = false;
  let cx = W/2, cy = H/2;

  function spawnFireball(x, y) {
    cx = x; cy = y;
    particles = [];
    embers = [];
    active = true;
    // 코어 파티클
    for (let i = 0; i < 120; i++) {
      const angle = rand(0, Math.PI * 2);
      const speed = rand(1.5, 8);
      const life = rand(0.5, 1.0);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - rand(0, 3),
        life, maxLife: life,
        size: rand(3, 14),
        hue: rand(10, 50),
      });
    }
    // 불꽃 잔불
    for (let i = 0; i < 60; i++) {
      const angle = rand(0, Math.PI * 2);
      const speed = rand(0.5, 4);
      embers.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - rand(1, 5),
        life: rand(0.3, 0.8),
        maxLife: 0.8,
        size: rand(1, 4),
      });
    }
  }

  function drawBg() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
  }

  let raf;
  function animate() {
    drawBg();
    if (!active) { raf = requestAnimationFrame(animate); return; }

    // 충격파 링
    const elapsed = 1 - (particles[0]?.life / particles[0]?.maxLife || 0);
    const ringR = elapsed * 80;
    if (ringR < 80) {
      ctx.beginPath();
      ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,180,60,${0.6 * (1 - ringR/80)})`;
      ctx.lineWidth = 4 * (1 - ringR/80) + 1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, ringR * 0.7, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,200,${0.3 * (1 - ringR/80)})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // 파티클 렌더
    for (let p of particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.97;
      p.life -= 0.018;
      const t = p.life / p.maxLife;
      const alpha = clamp(t * 2, 0, 1);
      const r = Math.floor(255);
      const g = Math.floor(lerp(30, 200, t));
      const b = Math.floor(lerp(0, 30, t));
      ctx.beginPath();
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * t);
      grad.addColorStop(0, `rgba(255,255,200,${alpha})`);
      grad.addColorStop(0.4, `rgba(${r},${g},${b},${alpha * 0.9})`);
      grad.addColorStop(1, `rgba(${r},0,0,0)`);
      ctx.fillStyle = grad;
      ctx.arc(p.x, p.y, p.size * (0.5 + t * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    // 잔불
    for (let e of embers) {
      e.x += e.vx; e.y += e.vy;
      e.vy += 0.05;
      e.life -= 0.015;
      const t = e.life / e.maxLife;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * t, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,${Math.floor(lerp(50,200,t))},0,${t})`;
      ctx.fill();
    }

    particles = particles.filter(p => p.life > 0);
    embers = embers.filter(e => e.life > 0);
    if (particles.length === 0 && embers.length === 0) active = false;
    raf = requestAnimationFrame(animate);
  }
  animate();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    spawnFireball(e.clientX - r.left, e.clientY - r.top);
  });
  spawnFireball(W/2, H/2);
})();

// ─── 2. 번개 스트라이크 ──────────────────────────────────────────────
(function() {
  const { canvas, ctx, W, H } = makeCanvas('c2');
  let bolts = [];
  let flashes = [];
  let sparks = [];

  function zigzag(x1, y1, x2, y2, roughness, depth) {
    if (depth === 0) return [[x1,y1],[x2,y2]];
    const mx = (x1+x2)/2 + rand(-roughness, roughness);
    const my = (y1+y2)/2 + rand(-roughness, roughness);
    const r2 = roughness * 0.55;
    return [...zigzag(x1,y1,mx,my,r2,depth-1), ...zigzag(mx,my,x2,y2,r2,depth-1).slice(1)];
  }

  function spawnLightning(tx, ty) {
    const sx = tx + rand(-20, 20);
    const sy = 0;
    const pts = zigzag(sx, sy, tx, ty, 28, 6);
    const life = 0.55;
    bolts.push({ pts, life, maxLife: life, width: rand(2, 4) });
    // 가지 번개
    for (let i = 0; i < 3; i++) {
      const idx = randInt(pts.length * 0.3, pts.length * 0.8);
      const [bx, by] = pts[idx];
      const ex = bx + rand(-60, 60);
      const ey = by + rand(20, 80);
      const bpts = zigzag(bx, by, ex, ey, 14, 4);
      bolts.push({ pts: bpts, life: life * 0.6, maxLife: life * 0.6, width: rand(0.8, 2) });
    }
    // 섬광
    flashes.push({ x: tx, y: ty, r: 0, maxR: 70, life: 0.4, maxLife: 0.4 });
    // 스파크
    for (let i = 0; i < 40; i++) {
      const angle = rand(0, Math.PI * 2);
      const spd = rand(2, 9);
      sparks.push({
        x: tx, y: ty,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - rand(0, 4),
        life: rand(0.2, 0.6), maxLife: 0.6,
      });
    }
  }

  function drawBg() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
  }

  function animate() {
    drawBg();
    // 섬광
    for (let f of flashes) {
      f.r = lerp(f.r, f.maxR, 0.25);
      f.life -= 0.04;
      const t = f.life / f.maxLife;
      const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
      g.addColorStop(0, `rgba(200,220,255,${t * 0.9})`);
      g.addColorStop(0.3, `rgba(100,150,255,${t * 0.5})`);
      g.addColorStop(1, `rgba(60,80,200,0)`);
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }
    // 번개 볼트
    for (let b of bolts) {
      const t = b.life / b.maxLife;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      // 글로우 레이어
      ctx.beginPath();
      ctx.moveTo(b.pts[0][0], b.pts[0][1]);
      for (let i = 1; i < b.pts.length; i++) ctx.lineTo(b.pts[i][0], b.pts[i][1]);
      ctx.strokeStyle = `rgba(100,160,255,${t * 0.4})`;
      ctx.lineWidth = b.width * 5;
      ctx.shadowColor = '#88aaff';
      ctx.shadowBlur = 18;
      ctx.stroke();
      // 코어
      ctx.beginPath();
      ctx.moveTo(b.pts[0][0], b.pts[0][1]);
      for (let i = 1; i < b.pts.length; i++) ctx.lineTo(b.pts[i][0], b.pts[i][1]);
      ctx.strokeStyle = `rgba(220,240,255,${t})`;
      ctx.lineWidth = b.width;
      ctx.shadowBlur = 6;
      ctx.stroke();
      ctx.restore();
      b.life -= 0.03;
    }
    // 스파크
    for (let s of sparks) {
      s.x += s.vx; s.y += s.vy;
      s.vy += 0.15;
      s.life -= 0.025;
      const t = s.life / s.maxLife;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.5 * t, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,210,255,${t})`;
      ctx.fill();
    }
    bolts = bolts.filter(b => b.life > 0);
    flashes = flashes.filter(f => f.life > 0);
    sparks = sparks.filter(s => s.life > 0);
    requestAnimationFrame(animate);
  }
  animate();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    spawnLightning(e.clientX - r.left, e.clientY - r.top);
  });
  spawnLightning(W/2, H - 30);
})();

// ─── 3. 충격파 ───────────────────────────────────────────────────────
(function() {
  const { canvas, ctx, W, H } = makeCanvas('c3');
  let waves = [];
  let debris = [];

  function spawnShockwave(x, y) {
    for (let i = 0; i < 4; i++) {
      waves.push({
        x, y, r: 0, maxR: 120 + i * 20,
        life: 1.0, maxLife: 1.0,
        delay: i * 0.06,
        hue: lerp(200, 60, i/3),
      });
    }
    // 지면 파편
    for (let i = 0; i < 50; i++) {
      const angle = rand(-Math.PI, 0);
      const spd = rand(3, 12);
      debris.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - rand(2, 8),
        life: rand(0.4, 1.0), maxLife: 1.0,
        size: rand(2, 7),
        rot: rand(0, Math.PI * 2),
        rotV: rand(-0.3, 0.3),
        hue: rand(20, 60),
      });
    }
    // 중앙 섬광
    waves.push({ x, y, r: 0, maxR: 40, life: 0.5, maxLife: 0.5, delay: 0, hue: 60, core: true });
  }

  function drawBg() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
  }

  function animate() {
    drawBg();
    for (let w of waves) {
      if (w.delay > 0) { w.delay -= 0.016; continue; }
      w.r = lerp(w.r, w.maxR, 0.12);
      w.life -= 0.022;
      const t = w.life / w.maxLife;
      if (w.core) {
        const g = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, w.r);
        g.addColorStop(0, `rgba(255,255,200,${t})`);
        g.addColorStop(0.5, `rgba(255,180,60,${t * 0.6})`);
        g.addColorStop(1, `rgba(255,100,0,0)`);
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      } else {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
        const lw = (1 - w.r / w.maxR) * 8 + 1;
        ctx.strokeStyle = `hsla(${w.hue},100%,70%,${t * 0.8})`;
        ctx.lineWidth = lw;
        ctx.shadowColor = `hsl(${w.hue},100%,60%)`;
        ctx.shadowBlur = 12;
        ctx.stroke();
        // 내부 링
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r * 0.85, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${w.hue},100%,90%,${t * 0.3})`;
        ctx.lineWidth = lw * 0.4;
        ctx.stroke();
        ctx.restore();
      }
    }
    for (let d of debris) {
      d.x += d.vx; d.y += d.vy;
      d.vy += 0.3;
      d.vx *= 0.98;
      d.rot += d.rotV;
      d.life -= 0.02;
      const t = d.life / d.maxLife;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.fillStyle = `hsla(${d.hue},80%,50%,${t})`;
      ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size * 0.5);
      ctx.restore();
    }
    waves = waves.filter(w => w.life > 0);
    debris = debris.filter(d => d.life > 0);
    requestAnimationFrame(animate);
  }
  animate();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    spawnShockwave(e.clientX - r.left, e.clientY - r.top);
  });
  spawnShockwave(W/2, H * 0.65);
})();

// ─── 4. 아이스 스파이크 ──────────────────────────────────────────────
(function() {
  const { canvas, ctx, W, H } = makeCanvas('c4');
  let spikes = [];
  let crystals = [];
  let frost = [];

  function spawnIce(x, y) {
    // 중앙 스파이크들
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + rand(-0.2, 0.2);
      const len = rand(30, 80);
      const spd = rand(4, 10);
      spikes.push({
        x, y, angle,
        len: 0, maxLen: len,
        vLen: spd,
        width: rand(4, 14),
        life: 1.0, maxLife: 1.0,
        hue: rand(180, 220),
      });
    }
    // 중앙 큰 스파이크
    spikes.push({ x, y, angle: -Math.PI/2, len: 0, maxLen: 100, vLen: 14, width: 18, life: 1.0, maxLife: 1.0, hue: 200 });
    // 크리스탈 파편
    for (let i = 0; i < 30; i++) {
      const angle = rand(0, Math.PI * 2);
      const spd = rand(1, 6);
      crystals.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - rand(0, 3),
        life: rand(0.4, 1.0), maxLife: 1.0,
        size: rand(2, 8),
        rot: rand(0, Math.PI * 2),
        rotV: rand(-0.2, 0.2),
      });
    }
    // 서리 파티클
    for (let i = 0; i < 50; i++) {
      const angle = rand(0, Math.PI * 2);
      const r = rand(0, 60);
      frost.push({
        x: x + Math.cos(angle) * r,
        y: y + Math.sin(angle) * r,
        life: rand(0.5, 1.5), maxLife: 1.5,
        size: rand(1, 4),
        vy: rand(-0.5, -2),
        vx: rand(-0.5, 0.5),
      });
    }
  }

  function drawSpike(ctx, x, y, angle, len, width, hue, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    const g = ctx.createLinearGradient(0, 0, len, 0);
    g.addColorStop(0, `hsla(${hue},100%,90%,${alpha})`);
    g.addColorStop(0.3, `hsla(${hue},90%,70%,${alpha * 0.9})`);
    g.addColorStop(1, `hsla(${hue},80%,50%,0)`);
    ctx.beginPath();
    ctx.moveTo(0, -width/2);
    ctx.lineTo(len, 0);
    ctx.lineTo(0, width/2);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();
    // 하이라이트
    ctx.beginPath();
    ctx.moveTo(0, -width * 0.1);
    ctx.lineTo(len * 0.8, 0);
    ctx.strokeStyle = `hsla(${hue},100%,95%,${alpha * 0.7})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  function drawBg() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
  }

  function animate() {
    drawBg();
    // 서리
    for (let f of frost) {
      f.x += f.vx; f.y += f.vy;
      f.life -= 0.02;
      const t = f.life / f.maxLife;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * t, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,230,255,${t * 0.6})`;
      ctx.fill();
    }
    // 스파이크
    for (let s of spikes) {
      s.len = Math.min(s.len + s.vLen, s.maxLen);
      if (s.len >= s.maxLen) s.life -= 0.025;
      const t = s.life / s.maxLife;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      // 글로우
      drawSpike(ctx, s.x, s.y, s.angle, s.len * 1.1, s.width * 1.5, s.hue, t * 0.3);
      ctx.restore();
      drawSpike(ctx, s.x, s.y, s.angle, s.len, s.width, s.hue, t);
    }
    // 크리스탈
    for (let c of crystals) {
      c.x += c.vx; c.y += c.vy;
      c.vy += 0.1;
      c.rot += c.rotV;
      c.life -= 0.02;
      const t = c.life / c.maxLife;
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.beginPath();
      ctx.moveTo(0, -c.size);
      ctx.lineTo(c.size * 0.5, 0);
      ctx.lineTo(0, c.size);
      ctx.lineTo(-c.size * 0.5, 0);
      ctx.closePath();
      ctx.fillStyle = `rgba(150,220,255,${t * 0.8})`;
      ctx.strokeStyle = `rgba(220,240,255,${t})`;
      ctx.lineWidth = 1;
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    spikes = spikes.filter(s => s.life > 0);
    crystals = crystals.filter(c => c.life > 0);
    frost = frost.filter(f => f.life > 0);
    requestAnimationFrame(animate);
  }
  animate();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    spawnIce(e.clientX - r.left, e.clientY - r.top);
  });
  spawnIce(W/2, H/2);
})();

// ─── 5. 성스러운 힐 ─────────────────────────────────────────────────
(function() {
  const { canvas, ctx, W, H } = makeCanvas('c5');
  let rings = [];
  let motes = [];
  let pillars = [];
  let time = 0;

  function spawnHeal(x, y) {
    for (let i = 0; i < 5; i++) {
      rings.push({
        x, y, r: 0, maxR: 80 + i * 15,
        life: 1.0, maxLife: 1.0,
        delay: i * 0.08,
        hue: lerp(50, 120, i/4),
      });
    }
    for (let i = 0; i < 60; i++) {
      const angle = rand(0, Math.PI * 2);
      const dist = rand(10, 70);
      motes.push({
        x: x + Math.cos(angle) * dist,
        y: y + Math.sin(angle) * dist,
        baseX: x + Math.cos(angle) * dist,
        baseY: y + Math.sin(angle) * dist,
        vx: Math.cos(angle) * rand(0.3, 1.5),
        vy: -rand(0.5, 2.5),
        life: rand(0.5, 1.5), maxLife: 1.5,
        size: rand(2, 6),
        hue: rand(60, 140),
        phase: rand(0, Math.PI * 2),
      });
    }
    // 빛기둥
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      pillars.push({
        x, y, angle,
        len: 0, maxLen: rand(40, 90),
        life: 1.0, maxLife: 1.0,
        hue: rand(60, 120),
      });
    }
  }

  function drawBg() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
  }

  function animate() {
    time += 0.05;
    drawBg();
    // 빛기둥
    for (let p of pillars) {
      p.len = Math.min(p.len + 5, p.maxLen);
      p.life -= 0.018;
      const t = p.life / p.maxLife;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      const g = ctx.createLinearGradient(0, 0, p.len, 0);
      g.addColorStop(0, `hsla(${p.hue},100%,80%,${t * 0.8})`);
      g.addColorStop(1, `hsla(${p.hue},100%,60%,0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, -2, p.len, 4);
      ctx.restore();
    }
    // 링
    for (let r of rings) {
      if (r.delay > 0) { r.delay -= 0.016; continue; }
      r.r = lerp(r.r, r.maxR, 0.1);
      r.life -= 0.02;
      const t = r.life / r.maxLife;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${r.hue},100%,80%,${t * 0.7})`;
      ctx.lineWidth = (1 - r.r / r.maxR) * 6 + 1;
      ctx.shadowColor = `hsl(${r.hue},100%,70%)`;
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.restore();
    }
    // 광점
    for (let m of motes) {
      m.x += m.vx + Math.sin(time + m.phase) * 0.3;
      m.y += m.vy;
      m.life -= 0.015;
      const t = m.life / m.maxLife;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.size * 2);
      g.addColorStop(0, `hsla(${m.hue},100%,90%,${t})`);
      g.addColorStop(1, `hsla(${m.hue},100%,60%,0)`);
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.size * 2, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    }
    rings = rings.filter(r => r.life > 0);
    motes = motes.filter(m => m.life > 0);
    pillars = pillars.filter(p => p.life > 0);
    requestAnimationFrame(animate);
  }
  animate();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    spawnHeal(e.clientX - r.left, e.clientY - r.top);
  });
  spawnHeal(W/2, H/2);
})();

// ─── 6. 보이드 블랙홀 ────────────────────────────────────────────────
(function() {
  const { canvas, ctx, W, H } = makeCanvas('c6');
  let holes = [];
  let debris = [];
  let time = 0;

  function spawnVoid(x, y) {
    holes.push({ x, y, r: 0, maxR: 55, life: 2.5, maxLife: 2.5, phase: rand(0, Math.PI*2) });
    for (let i = 0; i < 80; i++) {
      const angle = rand(0, Math.PI * 2);
      const dist = rand(30, 120);
      debris.push({
        x: x + Math.cos(angle) * dist,
        y: y + Math.sin(angle) * dist,
        cx: x, cy: y,
        angle,
        dist,
        orbitSpd: rand(0.03, 0.1) * (Math.random() > 0.5 ? 1 : -1),
        inSpd: rand(0.3, 1.5),
        life: rand(0.5, 2.5), maxLife: 2.5,
        size: rand(1, 5),
        hue: rand(240, 310),
      });
    }
  }

  function drawBg() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
  }

  function animate() {
    time += 0.04;
    drawBg();
    for (let h of holes) {
      h.r = Math.min(h.r + 1.5, h.maxR);
      h.life -= 0.018;
      const t = h.life / h.maxLife;
      // 왜곡 링들
      for (let i = 4; i >= 0; i--) {
        const rr = h.r * (0.4 + i * 0.15);
        const hue = lerp(280, 200, i/4);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.arc(h.x, h.y, rr, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue},100%,60%,${t * (0.5 - i * 0.08)})`;
        ctx.lineWidth = (4 - i) * 1.5;
        ctx.shadowColor = `hsl(${hue},100%,50%)`;
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.restore();
      }
      // 회전 에너지 아크
      for (let i = 0; i < 3; i++) {
        const arcAngle = time * (1 + i * 0.3) + h.phase + (i * Math.PI * 2 / 3);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.translate(h.x, h.y);
        ctx.rotate(arcAngle);
        ctx.beginPath();
        ctx.arc(0, 0, h.r * 0.7, -0.8, 0.8);
        ctx.strokeStyle = `hsla(${270 + i*30},100%,70%,${t * 0.6})`;
        ctx.lineWidth = 3;
        ctx.shadowColor = `hsl(${270+i*30},100%,60%)`;
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.restore();
      }
      // 코어 블랙홀
      const coreG = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.r * 0.4);
      coreG.addColorStop(0, `rgba(0,0,0,1)`);
      coreG.addColorStop(0.7, `rgba(10,0,20,0.95)`);
      coreG.addColorStop(1, `rgba(40,0,80,0)`);
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = coreG;
      ctx.fill();
    }
    // 흡수되는 파편
    for (let d of debris) {
      d.angle += d.orbitSpd;
      d.dist = Math.max(0, d.dist - d.inSpd);
      d.x = d.cx + Math.cos(d.angle) * d.dist;
      d.y = d.cy + Math.sin(d.angle) * d.dist;
      d.life -= 0.018;
      const t = d.life / d.maxLife;
      const distT = d.dist / 120;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * distT, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${d.hue},100%,70%,${t * distT})`;
      ctx.fill();
      ctx.restore();
    }
    holes = holes.filter(h => h.life > 0);
    debris = debris.filter(d => d.life > 0 && d.dist > 2);
    requestAnimationFrame(animate);
  }
  animate();
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    spawnVoid(e.clientX - r.left, e.clientY - r.top);
  });
  spawnVoid(W/2, H/2);
})();
</script>
