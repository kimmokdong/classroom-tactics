<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>교실 택틱스 — 1~3코스트 스킬 이펙트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0c0c18;color:#ccd;
  font-family:'Malgun Gothic','Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 8px 40px;
}
h1{font-size:1.2rem;color:#aac0ff;letter-spacing:2px;margin-bottom:3px;text-transform:uppercase;}
.sub{font-size:.7rem;color:#445;margin-bottom:14px;letter-spacing:1px;}
.sec{
  width:100%;max-width:1060px;
  font-size:.68rem;letter-spacing:3px;text-transform:uppercase;
  color:#556;border-bottom:1px solid #181830;
  padding:5px 0 3px;margin:8px 0 8px;
}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:1060px;}
.card{
  background:#0e0e1e;border:1px solid #1a1a35;border-radius:8px;
  overflow:hidden;display:flex;flex-direction:column;align-items:center;
}
.ct{font-size:.65rem;color:#7788bb;padding:5px 2px 2px;text-align:center;letter-spacing:.5px;}
.cs{font-size:.55rem;color:#445;padding-bottom:2px;}
canvas{display:block;cursor:pointer;}
.hint{font-size:.55rem;color:#334;padding:2px 0 5px;}
</style>
</head>
<body>
<h1>⚔️ Classroom Tactics — Tier 1~3 Skills</h1>
<p class="sub">클릭하면 스킬 발동</p>

<div class="sec">🟢 1코스트</div>
<div class="grid" id="g1"></div>
<div class="sec">🔵 2코스트</div>
<div class="grid" id="g2"></div>
<div class="sec">🟡 3코스트</div>
<div class="grid" id="g3"></div>

<script>
/* ═══════════════════════════════════
   공통 유틸
═══════════════════════════════════ */
const R=(a,b)=>Math.random()*(b-a)+a;
const RI=(a,b)=>Math.floor(R(a,b));
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;
const W=200,H=150;

function mkCard(gid,id,emoji,name,cost,type){
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`<div class="ct">${emoji} ${name}</div>
    <div class="cs">${cost}코 · ${type}</div>
    <canvas id="${id}" width="${W}" height="${H}"></canvas>
    <div class="hint">Click</div>`;
  document.getElementById(gid).appendChild(d);
  const cv=d.querySelector('canvas');
  return{cv,ctx:cv.getContext('2d')};
}

const BG='#0c0c18';
function bg(ctx){ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);}

/* ─── 공유 이펙트 함수들 ─────────────────────────── */

// 단일 타격 (물리) — 주황빛 임팩트 링 + 작은 파편
function fxHit(ctx,x,y,color='#ff9944'){
  let r=0,life=1;
  let sparks=Array.from({length:10},()=>{
    const a=R(0,TAU),s=R(1.5,5);
    return{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:R(.4,.9)};
  });
  return function tick(){
    r=lerp(r,28,0.2);life-=0.045;
    const t=Math.max(0,life);
    // 링
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);
    ctx.strokeStyle=color+Math.floor(t*220).toString(16).padStart(2,'0');
    ctx.lineWidth=2.5*(1-r/28)+0.5;ctx.stroke();
    // 파편
    sparks.forEach(s=>{
      s.x+=s.vx;s.y+=s.vy;s.vy+=0.1;s.l-=0.05;
      if(s.l<=0)return;
      ctx.beginPath();ctx.arc(s.x,s.y,1.5*s.l,0,TAU);
      ctx.fillStyle=color+Math.floor(s.l*200).toString(16).padStart(2,'0');
      ctx.fill();
    });
    return life>0;
  };
}

// 단일 타격 (마법) — 보라/파랑 임팩트 + 별 파편
function fxMagicHit(ctx,x,y,color='#aa66ff'){
  let r=0,life=1;
  let pts=Array.from({length:8},(_,i)=>({a:i/8*TAU,r:0}));
  return function tick(){
    r=lerp(r,24,0.22);life-=0.04;
    const t=Math.max(0,life);
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);
    ctx.strokeStyle=color+Math.floor(t*180).toString(16).padStart(2,'0');
    ctx.lineWidth=2;ctx.stroke();
    // 별 방사
    pts.forEach(p=>{
      p.r=lerp(p.r,20,0.18);
      const px=x+Math.cos(p.a)*p.r,py=y+Math.sin(p.a)*p.r;
      ctx.beginPath();ctx.arc(px,py,1.5*t,0,TAU);
      ctx.fillStyle=color+Math.floor(t*200).toString(16).padStart(2,'0');
      ctx.fill();
    });
    ctx.restore();
    return life>0;
  };
}

// AOE 링 (범위 피해) — 팽창하는 원형 파동
function fxAoeRing(ctx,x,y,maxR=40,color='#ff6633'){
  let r=0,life=1;
  return function tick(){
    r=lerp(r,maxR,0.14);life-=0.035;
    const t=Math.max(0,life);
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);
    ctx.strokeStyle=color+Math.floor(t*200).toString(16).padStart(2,'0');
    ctx.lineWidth=(1-r/maxR)*5+0.5;ctx.stroke();
    // 내부 채움
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,color+Math.floor(t*40).toString(16).padStart(2,'0'));
    g.addColorStop(1,color+'00');
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fillStyle=g;ctx.fill();
    return life>0;
  };
}

// 돌진 대시 — 빠른 잔상 선 + 충격
function fxDash(ctx,sx,sy,tx,ty,color='#ffcc44'){
  let t=0,life=1,done=false;
  let trail=[];
  return function tick(){
    t=Math.min(t+0.12,1);life-=0.03;
    const cx=lerp(sx,tx,t),cy=lerp(sy,ty,t);
    trail.push({x:cx,y:cy});if(trail.length>8)trail.shift();
    // 잔상
    trail.forEach((p,i)=>{
      const a=i/trail.length;
      ctx.beginPath();ctx.arc(p.x,p.y,4*a,0,TAU);
      ctx.fillStyle=color+Math.floor(a*160).toString(16).padStart(2,'0');
      ctx.fill();
    });
    // 선두
    ctx.beginPath();ctx.arc(cx,cy,5,0,TAU);
    ctx.fillStyle=color;ctx.fill();
    if(t>=1&&!done){
      done=true;
      // 충격 링
      ctx.beginPath();ctx.arc(tx,ty,15,0,TAU);
      ctx.strokeStyle=color+'cc';ctx.lineWidth=2;ctx.stroke();
    }
    return life>0;
  };
}

// 투사체 발사 → 타겟 타격
function fxProjectile(ctx,sx,sy,tx,ty,color='#88ccff',size=5,onHit){
  let t=0,hitFx=null;
  return function tick(){
    t=Math.min(t+0.06,1);
    const px=lerp(sx,tx,t),py=lerp(sy,ty,t);
    // 궤적
    ctx.beginPath();ctx.arc(px,py,size,0,TAU);
    const g=ctx.createRadialGradient(px,py,0,px,py,size);
    g.addColorStop(0,'#ffffff');g.addColorStop(1,color+'00');
    ctx.fillStyle=g;ctx.fill();
    if(t>=1){
      if(!hitFx) hitFx=onHit?onHit():fxMagicHit(ctx,tx,ty,color);
      if(hitFx&&!hitFx()) return false;
    }
    return true;
  };
}

// 튕기는 투사체 (bounce)
function fxBounce(ctx,pts,color='#88aaff',delay=0){
  let seg=0,t=0,life=1,hitFxs=[];
  let elapsed=0;
  return function tick(){
    elapsed+=0.016;if(elapsed<delay) return true;
    if(seg>=pts.length-1){life-=0.06;return life>0;}
    t=Math.min(t+0.1,1);
    const sx=pts[seg][0],sy=pts[seg][1],ex=pts[seg+1][0],ey=pts[seg+1][1];
    const px=lerp(sx,ex,t),py=lerp(sy,ey,t);
    // 잔상
    ctx.beginPath();ctx.arc(px,py,4,0,TAU);
    ctx.fillStyle=color+'cc';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,2,0,TAU);
    ctx.fillStyle='#ffffff';ctx.fill();
    if(t>=1){
      hitFxs.push(fxMagicHit(ctx,ex,ey,color));
      seg++;t=0;
    }
    hitFxs=hitFxs.filter(f=>f());
    return true;
  };
}

// 힐 — 녹색 상승 파티클
function fxHeal(ctx,x,y,count=12){
  let pts=Array.from({length:count},()=>({
    x:x+R(-20,20),y:y+R(-5,10),
    vy:R(-1.5,-0.5),life:R(.5,1.2),maxLife:1.2,
    size:R(2,5),hue:R(110,150)
  }));
  return function tick(){
    pts.forEach(p=>{p.y+=p.vy;p.life-=0.02;});
    pts=pts.filter(p=>p.life>0);
    pts.forEach(p=>{
      const t=p.life/p.maxLife;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*t,0,TAU);
      ctx.fillStyle=`hsla(${p.hue},90%,65%,${t})`;ctx.fill();
    });
    return pts.length>0;
  };
}

// 보호막 — 육각형 쉴드 펄스
function fxShield(ctx,x,y,color='#44aaff'){
  let r=0,life=1.2;
  return function tick(){
    r=Math.min(r+1.5,22);life-=0.025;
    const t=Math.max(0,life/1.2);
    ctx.save();
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*TAU-Math.PI/6;
      const px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.strokeStyle=color+Math.floor(t*220).toString(16).padStart(2,'0');
    ctx.lineWidth=2;ctx.stroke();
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,color+Math.floor(t*50).toString(16).padStart(2,'0'));
    g.addColorStop(1,color+'00');
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
    return life>0;
  };
}

// 도발 — 붉은 느낌표 + 링
function fxTaunt(ctx,x,y){
  let r=0,life=1.2;
  return function tick(){
    r=Math.min(r+1.2,25);life-=0.025;
    const t=Math.max(0,life/1.2);
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);
    ctx.strokeStyle=`rgba(255,60,60,${t*0.7})`;ctx.lineWidth=2;ctx.stroke();
    ctx.font=`bold ${Math.floor(16*t+4)}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(255,80,80,${t})`;
    ctx.fillText('!',x,y-r*0.3);
    return life>0;
  };
}

// 패시브 스택 — 위로 올라가는 숫자/아이콘
function fxPassive(ctx,x,y,icon='↑'){
  let py=y,life=1;
  return function tick(){
    py-=0.8;life-=0.025;
    const t=Math.max(0,life);
    ctx.font=`bold 14px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(255,220,80,${t})`;
    ctx.fillText(icon,x,py);
    return life>0;
  };
}

// 디버프 — 보라색 하강 파티클
function fxDebuff(ctx,x,y,count=10,color='#cc44ff'){
  let pts=Array.from({length:count},()=>({
    x:x+R(-25,25),y:y-R(5,20),
    vy:R(0.5,1.5),life:R(.5,1),maxLife:1,size:R(2,4)
  }));
  return function tick(){
    pts.forEach(p=>{p.y+=p.vy;p.life-=0.025;});
    pts=pts.filter(p=>p.life>0);
    pts.forEach(p=>{
      const t=p.life/p.maxLife;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*t,0,TAU);
      ctx.fillStyle=color+Math.floor(t*200).toString(16).padStart(2,'0');ctx.fill();
    });
    return pts.length>0;
  };
}

// 자기 버프 — 황금 오라 펄스
function fxSelfBuff(ctx,x,y,color='#ffcc00'){
  let r=0,life=1.2;
  let pts=Array.from({length:8},(_,i)=>({a:i/8*TAU,r:0}));
  return function tick(){
    r=Math.min(r+1.2,28);life-=0.022;
    const t=Math.max(0,life/1.2);
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);
    ctx.strokeStyle=color+Math.floor(t*160).toString(16).padStart(2,'0');
    ctx.lineWidth=2.5;ctx.stroke();
    pts.forEach(p=>{
      p.r=Math.min(p.r+0.8,r*0.8);
      const px=x+Math.cos(p.a)*p.r,py=y+Math.sin(p.a)*p.r;
      ctx.beginPath();ctx.arc(px,py,2*t,0,TAU);
      ctx.fillStyle=color+Math.floor(t*200).toString(16).padStart(2,'0');ctx.fill();
    });
    ctx.restore();
    return life>0;
  };
}

// 마나 버프 — 파란 마나 구슬 상승
function fxManaBuff(ctx,x,y){
  let pts=Array.from({length:8},()=>({
    x:x+R(-15,15),y:y+R(0,10),
    vy:R(-1.2,-0.4),life:R(.6,1.2),maxLife:1.2,size:R(2,5)
  }));
  return function tick(){
    pts.forEach(p=>{p.y+=p.vy;p.life-=0.02;});
    pts=pts.filter(p=>p.life>0);
    pts.forEach(p=>{
      const t=p.life/p.maxLife;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*t,0,TAU);
      ctx.fillStyle=`rgba(80,160,255,${t})`;ctx.fill();
    });
    return pts.length>0;
  };
}

// 마나 번 — 파란 불꽃 소멸
function fxManaBurn(ctx,x,y){
  let pts=Array.from({length:15},()=>({
    x:x+R(-10,10),y:y+R(-5,5),
    vx:R(-1,1),vy:R(-2,-0.5),
    life:R(.4,.9),maxLife:.9,size:R(2,6)
  }));
  return function tick(){
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.03;});
    pts=pts.filter(p=>p.life>0);
    pts.forEach(p=>{
      const t=p.life/p.maxLife;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*t,0,TAU);
      ctx.fillStyle=`rgba(60,120,255,${t*0.9})`;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*t*0.4,0,TAU);
      ctx.fillStyle=`rgba(180,220,255,${t})`;ctx.fill();
    });
    return pts.length>0;
  };
}

// 전체 팀 힐 — 맵 전체 녹색 파동
function fxTeamHeal(ctx){
  let r=0,life=1;
  return function tick(){
    r=lerp(r,Math.max(W,H)*0.8,0.1);life-=0.03;
    const t=Math.max(0,life);
    ctx.beginPath();ctx.arc(W/2,H/2,r,0,TAU);
    ctx.strokeStyle=`rgba(80,220,120,${t*0.5})`;ctx.lineWidth=3;ctx.stroke();
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
    g.addColorStop(0,`rgba(80,220,120,${t*0.08})`);
    g.addColorStop(1,'rgba(80,220,120,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    return life>0;
  };
}

// 전체 팀 버프 — 황금 파동
function fxTeamBuff(ctx,color='#ffcc44'){
  let r=0,life=1;
  return function tick(){
    r=lerp(r,Math.max(W,H)*0.8,0.1);life-=0.03;
    const t=Math.max(0,life);
    ctx.beginPath();ctx.arc(W/2,H/2,r,0,TAU);
    ctx.strokeStyle=color+Math.floor(t*160).toString(16).padStart(2,'0');
    ctx.lineWidth=3;ctx.stroke();
    return life>0;
  };
}

// 전체 디버프 — 어두운 파동
function fxAoeDebuff(ctx,x,y,maxR=50,color='#cc44ff'){
  let r=0,life=1;
  return function tick(){
    r=lerp(r,maxR,0.12);life-=0.03;
    const t=Math.max(0,life);
    ctx.beginPath();ctx.arc(x,y,r,0,TAU);
    ctx.strokeStyle=color+Math.floor(t*180).toString(16).padStart(2,'0');
    ctx.lineWidth=2;ctx.stroke();
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,color+Math.floor(t*30).toString(16).padStart(2,'0'));
    g.addColorStop(1,color+'00');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    return life>0;
  };
}

// 흡혈 — 붉은 구슬이 타겟→시전자로 이동
function fxLifesteal(ctx,tx,ty,sx,sy){
  let t=0,life=1;
  return function tick(){
    t=Math.min(t+0.06,1);life-=0.025;
    const px=lerp(tx,sx,t),py=lerp(ty,sy,t);
    ctx.beginPath();ctx.arc(px,py,4*(1-t*0.5),0,TAU);
    ctx.fillStyle=`rgba(255,60,60,${1-t*0.3})`;ctx.fill();
    return life>0&&t<1;
  };
}

/* ═══════════════════════════════════
   캔버스 루프 관리
═══════════════════════════════════ */
const loops=new Map();
function startLoop(id,ctx,fxFactory){
  if(loops.has(id)) loops.get(id).stop=true;
  const state={stop:false,fxList:[]};
  loops.set(id,state);
  function frame(){
    if(state.stop) return;
    bg(ctx);
    drawUnits(ctx,id);
    state.fxList=state.fxList.filter(f=>f());
    requestAnimationFrame(frame);
  }
  frame();
  return state;
}

// 유닛 위치 정의 (시전자 + 적/아군 배치)
const unitLayouts={
  // 단일 타겟: 시전자 좌, 적 우
  single:  {caster:[W*0.2,H*0.55],targets:[[W*0.75,H*0.45]]},
  // 단일 + 주변: 시전자 좌, 적 3개
  aoe3:    {caster:[W*0.2,H*0.55],targets:[[W*0.7,H*0.35],[W*0.8,H*0.55],[W*0.7,H*0.72]]},
  // 전체 범위: 시전자 좌, 적 4개
  aoe4:    {caster:[W*0.18,H*0.5],targets:[[W*0.65,H*0.28],[W*0.8,H*0.45],[W*0.75,H*0.65],[W*0.6,H*0.75]]},
  // 아군 힐: 시전자 + 아군 2명
  ally2:   {caster:[W*0.5,H*0.55],allies:[[W*0.2,H*0.4],[W*0.8,H*0.4]]},
  // 아군 전체: 시전자 + 아군 4명
  ally4:   {caster:[W*0.5,H*0.7],allies:[[W*0.15,H*0.35],[W*0.38,H*0.3],[W*0.62,H*0.3],[W*0.85,H*0.35]]},
  // 자기 버프: 시전자만
  self:    {caster:[W*0.5,H*0.55]},
  // 튕김: 시전자 좌, 적 3개 (튕김 경로)
  bounce3: {caster:[W*0.15,H*0.55],targets:[[W*0.55,H*0.35],[W*0.75,H*0.6],[W*0.6,H*0.75]]},
  bounce4: {caster:[W*0.15,H*0.55],targets:[[W*0.5,H*0.3],[W*0.72,H*0.45],[W*0.65,H*0.7],[W*0.45,H*0.75]]},
};

const unitEmojis={
  e_c1_1:'🧹',e_c1_2:'🏃',e_c1_3:'🔤',e_c1_4:'📖',e_c1_5:'➕',
  e_c1_6:'🌍',e_c1_7:'🔭',e_c1_8:'🎵',e_c1_9:'🗿',e_c1_10:'🛑',
  e_c2_1:'🧪',e_c2_2:'⚽',e_c2_3:'📚',e_c2_4:'📐',e_c2_5:'📜',
  e_c2_6:'🎧',e_c2_7:'🍱',e_c2_8:'🧢',e_c2_9:'🎤',e_c2_10:'🙋',
  e_c3_1:'🏆',e_c3_2:'💊',e_c3_3:'🥇',e_c3_4:'💡',e_c3_5:'🗺️',
  e_c3_6:'🍵',e_c3_7:'🗣️',e_c3_8:'🎼',e_c3_9:'🎨',
};

function drawUnits(ctx,id){
  const em=unitEmojis[id]||'🧑';
  const layout=unitLayouts[unitLayoutMap[id]]||unitLayouts.single;
  ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  // 시전자
  ctx.fillText(em,layout.caster[0],layout.caster[1]);
  // 적
  if(layout.targets) layout.targets.forEach(t=>ctx.fillText('👿',t[0],t[1]));
  // 아군
  if(layout.allies) layout.allies.forEach(a=>ctx.fillText('🧑',a[0],a[1]));
}

const unitLayoutMap={
  e_c1_1:'aoe3',e_c1_2:'single',e_c1_3:'aoe3',e_c1_4:'single',
  e_c1_5:'self',e_c1_6:'single',e_c1_7:'single',e_c1_8:'ally2',
  e_c1_9:'self',e_c1_10:'aoe3',
  e_c2_1:'aoe3',e_c2_2:'single',e_c2_3:'ally4',e_c2_4:'bounce3',
  e_c2_5:'single',e_c2_6:'aoe3',e_c2_7:'ally4',e_c2_8:'single',
  e_c2_9:'ally2',e_c2_10:'aoe3',
  e_c3_1:'single',e_c3_2:'ally2',e_c3_3:'self',e_c3_4:'aoe3',
  e_c3_5:'single',e_c3_6:'bounce4',e_c3_7:'single',e_c3_8:'ally4',
  e_c3_9:'aoe4',
};

/* ═══════════════════════════════════
   각 유닛 스킬 발동 함수
═══════════════════════════════════ */
function castSkill(id,ctx){
  const L=unitLayouts[unitLayoutMap[id]||'single'];
  const cx=L.caster[0],cy=L.caster[1];
  const t0=L.targets?L.targets[0]:[W*0.75,H*0.45];
  const st=loops.get(id);
  if(!st) return;
  const add=f=>st.fxList.push(f);

  switch(id){
    // ─── 1코스트 ───────────────────────────────────
    case 'e_c1_1': // 칠판닦이 당번: 주변 AOE + 방어 버프
      L.targets.forEach(t=>add(fxAoeRing(ctx,t[0],t[1],22,'#ff8844')));
      add(fxSelfBuff(ctx,cx,cy,'#aaddff'));
      break;
    case 'e_c1_2': // 달리기 선수: 돌진 + 기절
      add(fxDash(ctx,cx,cy,t0[0],t0[1],'#ffcc44'));
      setTimeout(()=>add(fxTaunt(ctx,t0[0],t0[1])),400);
      break;
    case 'e_c1_3': // 영단어 암기왕: 랜덤 3명 피해
      L.targets.forEach((t,i)=>setTimeout(()=>{
        add(fxProjectile(ctx,cx,cy,t[0],t[1],'#88ccff',4));
      },i*120));
      break;
    case 'e_c1_4': // 국어부장: 단일 도트딜 (보라 지속)
      add(fxProjectile(ctx,cx,cy,t0[0],t0[1],'#cc66ff',4,
        ()=>fxDebuff(ctx,t0[0],t0[1],8,'#cc66ff')));
      break;
    case 'e_c1_5': // 수학 짝꿍: 패시브 스택 (공격력↑)
      add(fxPassive(ctx,cx,cy,'⚔️↑'));
      add(fxSelfBuff(ctx,cx,cy,'#ffdd88'));
      break;
    case 'e_c1_6': // 지리덕후: 단일 물리 관통
      add(fxDash(ctx,cx,cy,t0[0],t0[1],'#ff9944'));
      setTimeout(()=>add(fxHit(ctx,t0[0],t0[1],'#ff9944')),350);
      break;
    case 'e_c1_7': // 과학탐구원: 단일 피해 + 흡혈
      add(fxProjectile(ctx,cx,cy,t0[0],t0[1],'#ff6644',4,
        ()=>{
          add(fxHit(ctx,t0[0],t0[1],'#ff6644'));
          setTimeout(()=>add(fxLifesteal(ctx,t0[0],t0[1],cx,cy)),200);
          return null;
        }));
      break;
    case 'e_c1_8': // 리코더 요정: 힐
      L.allies.forEach((a,i)=>setTimeout(()=>add(fxHeal(ctx,a[0],a[1],10)),i*150));
      break;
    case 'e_c1_9': // 찰흙 조각가: 자기 보호막
      add(fxShield(ctx,cx,cy,'#cc9944'));
      break;
    case 'e_c1_10': // 복도 지킴이: 도발
      add(fxSelfBuff(ctx,cx,cy,'#4488ff'));
      L.targets.forEach((t,i)=>setTimeout(()=>add(fxTaunt(ctx,t[0],t[1])),i*80));
      break;

    // ─── 2코스트 ───────────────────────────────────
    case 'e_c2_1': // 과학실험부장: AOE 마법
      add(fxAoeRing(ctx,t0[0],t0[1],38,'#aa66ff'));
      L.targets.forEach(t=>setTimeout(()=>add(fxMagicHit(ctx,t[0],t[1],'#aa66ff')),200));
      break;
    case 'e_c2_2': // 체육부장: 돌진 + 기절
      add(fxDash(ctx,cx,cy,t0[0],t0[1],'#ff8833'));
      setTimeout(()=>{
        add(fxHit(ctx,t0[0],t0[1],'#ff8833'));
        add(fxTaunt(ctx,t0[0],t0[1]));
      },380);
      break;
    case 'e_c2_3': // 문학소녀: 팀 버프 + 적 디버프
      add(fxTeamBuff(ctx,'#ffcc44'));
      L.targets.forEach((t,i)=>setTimeout(()=>add(fxDebuff(ctx,t[0],t[1],6,'#cc44ff')),i*80+200));
      break;
    case 'e_c2_4': // 수학천재: 피타고라스 튕김
      {
        const pts=[[cx,cy],...L.targets.map(t=>[t[0],t[1]])];
        add(fxBounce(ctx,pts,'#88aaff'));
      }
      break;
    case 'e_c2_5': // 역사 매니아: 고정 피해 (진한 보라)
      add(fxProjectile(ctx,cx,cy,t0[0],t0[1],'#ff44aa',5,
        ()=>fxMagicHit(ctx,t0[0],t0[1],'#ff44aa')));
      break;
    case 'e_c2_6': // 팝송 매니아: 랜덤 3명 + 마나 감소
      L.targets.forEach((t,i)=>setTimeout(()=>{
        add(fxProjectile(ctx,cx,cy,t[0],t[1],'#ff88cc',4,
          ()=>fxDebuff(ctx,t[0],t[1],6,'#ff88cc')));
      },i*130));
      break;
    case 'e_c2_7': // 급식 당번: 전체 힐
      add(fxTeamHeal(ctx));
      L.allies.forEach((a,i)=>setTimeout(()=>add(fxHeal(ctx,a[0],a[1],8)),i*100+150));
      break;
    case 'e_c2_8': // 골목대장: 강타 + 스플래시 + 공격력↑
      add(fxDash(ctx,cx,cy,t0[0],t0[1],'#ff6622'));
      setTimeout(()=>{
        add(fxHit(ctx,t0[0],t0[1],'#ff6622'));
        add(fxAoeRing(ctx,t0[0],t0[1],28,'#ff6622'));
        add(fxPassive(ctx,cx,cy,'⚔️↑'));
      },350);
      break;
    case 'e_c2_9': // 합창단 에이스: 아군 2명 보호막
      L.allies.forEach((a,i)=>setTimeout(()=>add(fxShield(ctx,a[0],a[1],'#88ccff')),i*150));
      break;
    case 'e_c2_10': // 바른생활 사나이: 주변 적 공격력 감소
      add(fxAoeDebuff(ctx,cx,cy,50,'#cc44ff'));
      L.targets.forEach((t,i)=>setTimeout(()=>add(fxDebuff(ctx,t[0],t[1],8,'#cc44ff')),i*80+200));
      break;

    // ─── 3코스트 ───────────────────────────────────
    case 'e_c3_1': // 올림피아드 금상: 강력 단일 관통
      add(fxDash(ctx,cx,cy,t0[0],t0[1],'#ffdd44'));
      setTimeout(()=>{
        add(fxHit(ctx,t0[0],t0[1],'#ffdd44'));
        add(fxAoeRing(ctx,t0[0],t0[1],18,'#ffdd44'));
      },300);
      break;
    case 'e_c3_2': // 양호실 도우미: 힐 + 보호막
      L.allies.forEach((a,i)=>setTimeout(()=>{
        add(fxHeal(ctx,a[0],a[1],12));
        add(fxShield(ctx,a[0],a[1],'#88ffcc'));
      },i*180));
      break;
    case 'e_c3_3': // 육상부 에이스: 자기 공속 버프
      add(fxSelfBuff(ctx,cx,cy,'#ffaa22'));
      add(fxPassive(ctx,cx,cy,'⚡↑'));
      break;
    case 'e_c3_4': // 발명품 매니아: 폭탄 AOE
      add(fxProjectile(ctx,cx,cy,t0[0],t0[1],'#ff8833',5,
        ()=>{
          add(fxAoeRing(ctx,t0[0],t0[1],42,'#ff8833'));
          L.targets.forEach(t=>add(fxHit(ctx,t[0],t[1],'#ff8833')));
          return null;
        }));
      break;
    case 'e_c3_5': // 사회탐구 1타: 가장 먼 적 마법 피해
      add(fxProjectile(ctx,cx,cy,t0[0],t0[1],'#aa66ff',6,
        ()=>fxMagicHit(ctx,t0[0],t0[1],'#aa66ff')));
      break;
    case 'e_c3_6': // 시조 읊는 선비: 튕기는 마법 + 치유 감소
      {
        const pts=[[cx,cy],...L.targets.map(t=>[t[0],t[1]])];
        add(fxBounce(ctx,pts,'#66ddaa'));
        // 치유 감소 (하향 화살표)
        L.targets.forEach((t,i)=>setTimeout(()=>add(fxPassive(ctx,t[0],t[1],'💚↓')),i*200+300));
      }
      break;
    case 'e_c3_7': // 영어 프리토커: 마나 소멸 + 마법 피해
      add(fxProjectile(ctx,cx,cy,t0[0],t0[1],'#4488ff',5,
        ()=>{
          add(fxManaBurn(ctx,t0[0],t0[1]));
          add(fxMagicHit(ctx,t0[0],t0[1],'#4488ff'));
          return null;
        }));
      break;
    case 'e_c3_8': // 오케스트라 단장: 전체 힐 + 공속 버프
      add(fxTeamHeal(ctx));
      L.allies.forEach((a,i)=>setTimeout(()=>{
        add(fxHeal(ctx,a[0],a[1],10));
        add(fxManaBuff(ctx,a[0],a[1]));
      },i*100+200));
      break;
    case 'e_c3_9': // 수채화 장인: 랜덤 4명 마법 + 마나 봉인
      L.targets.forEach((t,i)=>setTimeout(()=>{
        add(fxMagicHit(ctx,t[0],t[1],'#ff88aa'));
        add(fxDebuff(ctx,t[0],t[1],6,'#ff88aa'));
      },i*120));
      break;
  }
}

/* ═══════════════════════════════════
   유닛 카드 생성 + 루프 시작
═══════════════════════════════════ */
const units=[
  // 1코스트
  {g:'g1',id:'e_c1_1',em:'🧹',name:'칠판닦이 당번',cost:1,type:'AOE+방어버프'},
  {g:'g1',id:'e_c1_2',em:'🏃',name:'달리기 선수',cost:1,type:'돌진+기절'},
  {g:'g1',id:'e_c1_3',em:'🔤',name:'영단어 암기왕',cost:1,type:'랜덤3타'},
  {g:'g1',id:'e_c1_4',em:'📖',name:'국어부장',cost:1,type:'단일 도트'},
  {g:'g1',id:'e_c1_5',em:'➕',name:'수학 짝꿍',cost:1,type:'패시브 스택'},
  {g:'g1',id:'e_c1_6',em:'🌍',name:'지리덕후',cost:1,type:'관통 타격'},
  {g:'g1',id:'e_c1_7',em:'🔭',name:'과학탐구원',cost:1,type:'타격+흡혈'},
  {g:'g1',id:'e_c1_8',em:'🎵',name:'리코더 요정',cost:1,type:'단일 힐'},
  {g:'g1',id:'e_c1_9',em:'🗿',name:'찰흙 조각가',cost:1,type:'자기 보호막'},
  {g:'g1',id:'e_c1_10',em:'🛑',name:'복도 지킴이',cost:1,type:'도발'},
  // 2코스트
  {g:'g2',id:'e_c2_1',em:'🧪',name:'과학실험부장',cost:2,type:'AOE 마법'},
  {g:'g2',id:'e_c2_2',em:'⚽',name:'체육부장',cost:2,type:'돌진+기절'},
  {g:'g2',id:'e_c2_3',em:'📚',name:'문학소녀',cost:2,type:'팀버프+디버프'},
  {g:'g2',id:'e_c2_4',em:'📐',name:'수학천재',cost:2,type:'튕김 투사체'},
  {g:'g2',id:'e_c2_5',em:'📜',name:'역사 매니아',cost:2,type:'고정 피해'},
  {g:'g2',id:'e_c2_6',em:'🎧',name:'팝송 매니아',cost:2,type:'랜덤3+마나감소'},

  {g:'g2',id:'e_c2_10',em:'🙋',name:'바른생활 사나이',cost:2,type:'AOE 디버프'},

  {g:'g3',id:'e_c3_1',em:'🏆',name:'올림피아드 금상',cost:3,type:'강타 관통'},
  {g:'g3',id:'e_c3_2',em:'💊',name:'양호실 도우미',cost:3,type:'힐+보호막'},

  {g:'g3',id:'e_c3_7',em:'🗣️',name:'영어 프리토커',cost:3,type:'마나 소멸'},
  {g:'g3',id:'e_c3_8',em:'🎼',name:'오케스트라 단장',cost:3,type:'전체힐+공속'},
  {g:'g3',id:'e_c3_9',em:'🎨',name:'수채화 장인',cost:3,type:'랜덤4+마나봉인'},

units.forEach(u=>{
  const {cv,ctx}=mkCard(u.g,u.id,u.em,u.name,u.cost,u.type);
  const state=startLoop(u.id,ctx,null);
  // 초기 자동 발동
  setTimeout(()=>castSkill(u.id,ctx),300+Math.random()*400);
  // 클릭 발동
  cv.addEventListener('click',()=>castSkill(u.id,ctx));
});
